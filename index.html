			user-select: none;
		}
		body {
			display: grid;
			place-items: center;
			background-color: #454845;
		}
		#pixi-container {
			background-color: #454845;
			background-image: url(assets/preload/Loading.png);
			background-position: center center;
			background-size: cover;
		}
		canvas {
			display: block;
			outline: none;
			z-index: 1;
		}
		#pixi-container,
		canvas {
			width: min(100vw, 100vh * 9/16);
			height: min(100vh, 100vw * 16/9);
		}
